<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://*.cloudfunctions.net; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:;">
<meta http-equiv="refresh" content="12;url=./pages/home.html">
<meta name="description" content="Chargement sécurisé de MASTER UNLOCKER.">
<title>MASTER UNLOCKER</title>

<link rel="stylesheet" href="./css/style.css">
</head>

<body class="page-public">

<div id="global-app-loader" style="position: fixed; inset: 0; background-color: #0f172a; display: flex; justify-content: center; align-items: center; z-index: 99999; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif;">
    <div class="loader-container" style="text-align: center; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div class="spinner-ring" style="position: absolute; width: 170px; height: 170px; border: 4px solid rgba(108, 92, 231, 0.08); border-top: 4px solid #6c5ce7; border-right: 4px solid #00cec9; border-radius: 50%; animation: spin 2s linear infinite;"></div>
        <div class="animation-box" style="position: relative; width: 130px; height: 130px; display: flex; justify-content: center; align-items: center; z-index: 2;">
            <svg class="unlock-svg" viewBox="0 0 64 64" style="width: 80px; height: 80px; fill: none; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round;">
                <path id="shackle" class="lock-shackle" d="M20 30 V20 A12 12 0 0 1 44 20 V30" style="stroke: #6c5ce7; transform-origin: 20px 24px; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);" />
                <rect id="body" class="lock-body" x="14" y="30" width="36" height="26" rx="5" style="stroke: #ffffff;" />
                <circle cx="32" cy="40" r="3" fill="#0f172a" stroke="#ffffff" stroke-width="2"/>
                <path d="M32 43 L32 48" stroke="#ffffff" stroke-width="2" />
                <g id="key" class="key-group" style="stroke: #00cec9; transform-origin: 32px 42px; transform: translate(80px, -80px) scale(0); opacity: 0; transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;">
                    <circle cx="32" cy="42" r="5" />
                    <path d="M37 42 L54 42 M48 42 L48 46 M52 42 L52 46" />
                </g>
            </svg>
        </div>
        <div class="text-container" style="margin-top: 40px; z-index: 2;">
            <h1 class="title" style="color: #ffffff; font-size: 1.4rem; font-weight: 600; letter-spacing: 1px; margin-bottom: 8px;">MASTER UNLOCK</h1>
            <p id="status-text" class="subtitle" style="color: #a0aec0; font-size: 0.9rem; margin-bottom: 20px; min-height: 20px;">Initialisation des protocoles...</p>
            <div class="progress-bar-bg" style="width: 220px; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; margin: 0 auto; overflow: hidden;">
                <div id="progress-fill" class="progress-bar-fill" style="height: 100%; width: 0%; background: linear-gradient(90deg, #6c5ce7, #00cec9); border-radius: 10px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);"></div>
            </div>
        </div>
    </div>
</div>

<style>
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .lock-shackle.opened { transform: translateY(-4px) rotate(-45deg) !important; }
    .key-group.arrive { transform: translate(0, 0) scale(1) !important; opacity: 1 !important; }
    .key-group.turn { transform: translate(0, 0) scale(1) rotate(90deg) !important; }
    .key-group.fade-out { transform: translate(0, 10px) scale(0.8) rotate(90deg) !important; opacity: 0 !important; }
</style>

<noscript>
  <meta http-equiv="refresh" content="0;url=./pages/home.html">
</noscript>

<script>
  (function () {
    const progressFill = document.getElementById("progress-fill");
    const statusText = document.getElementById("status-text");
    const loader = document.getElementById("global-app-loader");
    const key = document.getElementById("key");
    const shackle = document.getElementById("shackle");
    const homeUrl = "./pages/home.html";

    if (!progressFill || !statusText || !loader || !key || !shackle) {
      window.location.replace(homeUrl);
      return;
    }

    const steps = [
      { progress: 15, text: "Connexion securisee S-Unlock API..." },
      { progress: 40, text: "Analyse des donnees materielles..." },
      { progress: 65, text: "Generation de la cle de deverrouillage..." },
      { progress: 85, text: "Injection et rotation du token..." },
      { progress: 100, text: "Succes ! Systeme totalement debloque." }
    ];

    let currentStep = 0;

    function redirectToHome() {
      statusText.style.color = "#00cec9";
      statusText.textContent = "Redirection en cours...";
      loader.style.transition = "opacity 260ms ease";
      loader.style.opacity = "0";
      window.setTimeout(function () {
        window.location.replace(homeUrl);
      }, 280);
    }

    function runLoader() {
      if (currentStep >= steps.length) {
        window.setTimeout(redirectToHome, 500);
        return;
      }

      const step = steps[currentStep];
      progressFill.style.width = step.progress + "%";
      statusText.textContent = step.text;

      if (step.progress === 65) {
        window.setTimeout(function () {
          key.classList.add("arrive");
        }, 200);
      }

      if (step.progress === 85) {
        window.setTimeout(function () {
          key.classList.add("turn");
          window.setTimeout(function () {
            shackle.classList.add("opened");
            window.setTimeout(function () {
              key.classList.add("fade-out");
            }, 250);
          }, 500);
        }, 300);
      }

      currentStep += 1;
      let duration = 1400;
      if (step.progress === 65) duration = 1800;
      if (step.progress === 85) duration = 2200;
      window.setTimeout(runLoader, duration);
    }

    window.setTimeout(runLoader, 500);
  })();
</script>

</body>
</html>
