<!-- Référence composant : conteneur toasts -->
<div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true">
  <!-- Exemples visuels (gérés par toast.js Phase 2) -->
  <div id="toast-example-success" class="toast toast-success" hidden role="alert">
    <span id="toast-success-message">Opération réussie.</span>
  </div>
  <div id="toast-example-error" class="toast toast-error" hidden role="alert">
    <span id="toast-error-message">Une erreur est survenue.</span>
  </div>
  <div id="toast-example-warning" class="toast toast-warning" hidden role="alert">
    <span id="toast-warning-message">Attention.</span>
  </div>
  <div id="toast-example-info" class="toast toast-info" hidden role="alert">
    <span id="toast-info-message">Information.</span>
  </div>
</div>
