<!-- Référence composant : structure modale -->
<div id="modal-root">
  <!-- Exemple structure (masqué par défaut, géré par modal.js Phase 2) -->
  <div id="modal-example" class="modal-backdrop" hidden role="dialog" aria-modal="true" aria-labelledby="modal-example-title">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-example-title" class="modal-title">Confirmation</h3>
        <button id="modal-example-close" class="modal-close" type="button" aria-label="Fermer">×</button>
      </div>
      <div class="modal-body">
        <p id="modal-example-message">Message de confirmation.</p>
      </div>
      <div class="modal-footer">
        <button id="modal-example-cancel" class="btn btn-ghost" type="button">Annuler</button>
        <button id="modal-example-confirm" class="btn btn-primary" type="button">Confirmer</button>
      </div>
    </div>
  </div>
</div>
