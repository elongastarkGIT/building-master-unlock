<!-- Référence composant : topbar dashboard utilisateur -->
<header id="dashboard-topbar" class="dashboard-topbar">
  <div class="dashboard-topbar-left">
    <button id="sidebar-toggle" class="menu-toggle" type="button" aria-label="Ouvrir le menu" aria-controls="dashboard-sidebar">☰</button>
    <h2 id="topbar-title" class="sr-only">Dashboard utilisateur</h2>
  </div>
  <div class="dashboard-topbar-right">
    <button id="notification-btn" class="notification-btn" type="button" aria-label="Notifications">
      <span aria-hidden="true">🔔</span>
      <span id="notification-dot" class="notification-dot" hidden></span>
    </button>
    <div id="user-menu" class="user-menu">
      <div id="user-avatar" class="user-avatar" aria-hidden="true">—</div>
      <div class="user-info">
        <span id="user-name" class="user-name">—</span>
        <span id="user-role" class="user-role">—</span>
      </div>
    </div>
  </div>
</header>
